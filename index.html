<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta de Cócteles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="theme-elegant">
    <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">
        <span class="theme-toggle__icon">🌙</span>
        <span class="theme-toggle__text">Tropical</span>
    </button>

    <header class="hero">
        <div class="hero__content">
            <p class="hero__subtitle">Bienvenido</p>
            <h1 class="hero__title">Carta de Cócteles</h1>
            <div class="hero__line"></div>
            <p class="hero__description">Descubre nuestra selección de tragos clásicos y creativos, preparados para cada momento.</p>
        </div>
        <div class="hero__scroll">
            <span>Desplaza</span>
            <div class="hero__scroll-dot"></div>
        </div>
    </header>

    <main class="menu" id="menu">
        <div class="container">
            <div class="menu__header">
                <h2 class="menu__title">Nuestra Carta</h2>
                <p class="menu__count"><span id="cocktailCount">0</span> creaciones</p>
            </div>
            <div class="menu__grid" id="cocktailGrid"></div>
        </div>
    </main>

    <footer class="footer">
        <p>Carta de Cócteles &copy; 2026</p>
    </footer>

    <div class="modal" id="cocktailModal" aria-hidden="true">
        <div class="modal__overlay" id="modalOverlay"></div>
        <div class="modal__content">
            <button class="modal__close" id="modalClose" aria-label="Cerrar">&times;</button>
            <div class="modal__image-wrapper">
                <img class="modal__image" id="modalImage" src="" alt="">
            </div>
            <div class="modal__body">
                <span class="modal__number" id="modalNumber"></span>
                <h3 class="modal__name" id="modalName"></h3>
                <p class="modal__slogan" id="modalSlogan"></p>
                <p class="modal__description" id="modalDescription"></p>
                <div class="modal__ingredients">
                    <h4>Ingredientes</h4>
                    <ul id="modalIngredients"></ul>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
